name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/setup-go@v4
        with:
          go-version: 1.16

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build
        shell: cmd
        run: doit.bat -ci

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sumatrapdf
          path: |
            **/*.exe
